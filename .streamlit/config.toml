# Streamlit configuration (used locally and on Streamlit Community Cloud).
# Default to a dark theme. To switch at runtime use the ⋮ menu (top-right)
# → Settings → Theme.
[theme]
base = "dark"
primaryColor = "#1a6fdb"

[browser]
gatherUsageStats = false

[server]
# Cap uploaded PDF size (the app also enforces 20 MB in code).
maxUploadSize = 25
